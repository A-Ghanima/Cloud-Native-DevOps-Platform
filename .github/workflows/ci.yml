name: CI 
on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs: 
  test:
    runs-on: ubuntu-latest
    steps:
      -  name: validate the code
         uses: actions/checkout@v4
      -  name: set up python
         uses: actions/setup-python@v5
         with:
          python-version: '3.12'
      -  name: install reqs
         run: pip install -r requirements.txt
      -  name: run the test
         run: pytest
